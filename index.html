<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BaaS + Google Auth</title>

<style>
body { font-family: Arial; background:#f4f7f6; display:flex; flex-direction:column; align-items:center; padding:20px;}
.container { background:#fff; padding:20px; border-radius:10px; width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
button { padding:10px; margin-top:10px; cursor:pointer; }
.post { background:#fff; border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:8px; width:400px;}
img { max-width:100%; border-radius:8px; margin-top:5px;}
</style>
</head>
<body>

<div class="container">

    <button id="loginBtn">Войти через Google</button>
    <button id="logoutBtn" style="display:none;">Выйти</button>

    <div id="userInfo" style="display:none;">
        👤 <span id="userName"></span>
    </div>

    <div id="form" style="display:none;">
        <input type="text" id="text" placeholder="Ваш текст">
        <input type="file" id="image">
        <button id="sendBtn">Опубликовать</button>
    </div>

</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore, collection, addDoc, query,
    orderBy, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
    getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const userInfo = document.getElementById("userInfo");
const userName = document.getElementById("userName");
const form = document.getElementById("form");

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

// ✅ Проверка авторизации
onAuthStateChanged(auth, (user) => {
    if (user) {
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        userInfo.style.display = "block";
        form.style.display = "block";

        userName.textContent = user.displayName;
    } else {
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
        userInfo.style.display = "none";
        form.style.display = "none";
    }
});

// ✅ Отправка поста (только если залогинен)
document.getElementById("sendBtn").onclick = async () => {
    const user = auth.currentUser;
    if (!user) return alert("Войдите!");

    const text = document.getElementById("text").value;
    const file = document.getElementById("image").files[0];

    let imageUrl = "";

    // 🔹 загрузка картинки
    if (file) {
        const storageRef = ref(storage, "images/" + Date.now());
        await uploadBytes(storageRef, file);
        imageUrl = await getDownloadURL(storageRef);
    }

    // 🔹 запись в Firestore
    await addDoc(collection(db, "posts"), {
        uid: user.uid,
        name: user.displayName,
        text: text,
        image: imageUrl,
        timestamp: serverTimestamp()
    });

    document.getElementById("text").value = "";
};

// ✅ Лента
const q = query(collection(db, "posts"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach(doc => {
        const d = doc.data();

        feed.innerHTML += `
            <div class="post">
                <b>${d.name}</b>
                <p>${d.text}</p>
                ${d.image ? `<img src="${d.image}">` : ""}
            </div>
        `;
    });
});
</script>

</body>
</html>
