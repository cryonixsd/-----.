<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
    getFirestore, collection, addDoc, onSnapshot,
    serverTimestamp, doc, setDoc,
    query, where, orderBy
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_DOMAIN",
  projectId: "ТВОЙ_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("loginBtn").onclick = () =>
    signInWithPopup(auth, provider);

let currentChatId = null;
let currentUserName = "";

// AUTH
onAuthStateChanged(auth, async (user) => {
    if (!user) return;

    document.getElementById("authBlock").style.display = "none";
    document.getElementById("profile").style.display = "block";
    document.getElementById("usersBlock").style.display = "block";
    document.getElementById("chatBlock").style.display = "block";

    currentUserName = user.displayName;

    document.getElementById("userName").innerText = user.displayName;
    document.getElementById("avatar").innerText =
        user.displayName[0];

    await setDoc(doc(db, "users", user.uid), {
        name: user.displayName
    });

    loadUsers();
});

// USERS
function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";

        snap.forEach(d => {
            if (d.id === auth.currentUser.uid) return;

            const u = d.data();

            const div = document.createElement("div");
            div.className = "user";

            div.innerHTML = `
                <div class="avatar">${u.name[0]}</div>
                ${u.name}
            `;

            div.onclick = () => startChat(d.id, u.name);

            list.appendChild(div);
        });
    });
}

// START CHAT
window.startChat = (otherId, name) => {
    currentChatId = [auth.currentUser.uid, otherId]
        .sort().join("_");

    document.getElementById("chatWith").innerText =
        "Чат с " + name;

    loadMessages();
};

// SEND
window.sendMessage = async () => {
    const input = document.getElementById("messageInput");

    if (!currentChatId) {
        alert("Выбери пользователя");
        return;
    }

    if (!input.value.trim()) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: auth.currentUser.uid,
        text: input.value,
        timestamp: serverTimestamp()
    });

    input.value = "";
};

// LOAD (ВАЖНО: теперь только нужные сообщения)
function loadMessages() {

    const q = query(
        collection(db, "messages"),
        where("chatId", "==", currentChatId),
        orderBy("timestamp")
    );

    onSnapshot(q, (snap) => {
        const chat = document.getElementById("chat");
        chat.innerHTML = "";

        snap.forEach(d => {
            const m = d.data();

            const isMe =
                m.senderId === auth.currentUser.uid;

            const div = document.createElement("div");
            div.className = "message " + (isMe ? "me" : "");
            div.textContent = m.text;

            chat.appendChild(div);
        });

        chat.scrollTop = chat.scrollHeight;
    });
}
</script>
