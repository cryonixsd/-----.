<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DM Firebase</title>

<style>
body {
    font-family: 'Segoe UI', Arial;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    margin: 0;
}

.navbar {
    background: #4CAF50;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    max-width: 500px;
    margin: 15px auto;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}

.user {
    padding: 8px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.message {
    padding: 6px;
    margin: 5px 0;
}

.me {
    text-align: right;
    color: green;
}
</style>
</head>

<body>

<div class="navbar" id="navbar" style="display:none;">
    <span id="userName"></span>
    <button id="logoutBtn">Выйти</button>
</div>

<div class="container" id="authBlock">
    <h3>Вход</h3>
    <button id="loginBtn">Войти через Google</button>
</div>

<div id="appBlock" style="display:none;">

    <!-- USERS -->
    <div class="container">
        <h3>Пользователи</h3>
        <div id="usersList"></div>
    </div>

    <!-- CHAT -->
    <div class="container">
        <h3>Чат</h3>
        <div id="chat"></div>

        <input id="messageInput" placeholder="Сообщение">
        <button onclick="sendMessage()">Отправить</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore, collection, addDoc, query,
    onSnapshot, serverTimestamp, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFVJ51BsKGuUxQt0o33SWEOGuwiZ3kEOk",
  authDomain: "nail-f4d56.firebaseapp.com",
  projectId: "nail-f4d56",
  storageBucket: "nail-f4d56.appspot.com",
  messagingSenderId: "168626129143",
  appId: "1:168626129143:web:e7ce853bb23007b490ebf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// UI
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const authBlock = document.getElementById("authBlock");
const appBlock = document.getElementById("appBlock");
const navbar = document.getElementById("navbar");

// LOGIN
loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

let currentChatId = null;

// STATE
onAuthStateChanged(auth, async (user) => {
    if (user) {
        authBlock.style.display = "none";
        appBlock.style.display = "block";
        navbar.style.display = "flex";

        document.getElementById("userName").innerText = user.displayName;

        // 🔥 сохраняем пользователя
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            email: user.email
        });

        loadUsers();
    } else {
        authBlock.style.display = "block";
        appBlock.style.display = "none";
        navbar.style.display = "none";
    }
});

// 👥 USERS
function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";

        snap.forEach(d => {
            if (d.id === auth.currentUser.uid) return;

            const u = d.data();

            list.innerHTML += `
                <div class="user" onclick="startChat('${d.id}')">
                    👤 ${u.name}
                </div>
            `;
        });
    });
}

// 💬 START CHAT
window.startChat = (otherUserId) => {
    const user = auth.currentUser;

    // уникальный id чата
    currentChatId = [user.uid, otherUserId].sort().join("_");

    loadMessages();
};

// ✉️ SEND
window.sendMessage = async () => {
    const text = document.getElementById("messageInput").value;
    if (!text || !currentChatId) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: auth.currentUser.uid,
        text,
        timestamp: serverTimestamp()
    });

    document.getElementById("messageInput").value = "";
};

// 🔄 LOAD MESSAGES
function loadMessages() {
    const q = query(collection(db, "messages"));

    onSnapshot(q, (snap) => {
        const chat = document.getElementById("chat");
        chat.innerHTML = "";

        snap.forEach(d => {
            const m = d.data();

            if (m.chatId !== currentChatId) return;

            chat.innerHTML += `
                <div class="message ${m.senderId === auth.currentUser.uid ? 'me' : ''}">
                    ${m.text}
                </div>
            `;
        });
    });
}
</script>

</body>
</html>
