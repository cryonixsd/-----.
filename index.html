<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BaaS + Google Auth</title>

<style>
body { font-family: Arial; background:#f4f7f6; text-align:center; padding:20px; }
.container { max-width:500px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
input { width:100%; padding:10px; margin:5px 0; }
button { padding:10px; margin-top:10px; width:100%; cursor:pointer; }
.post { background:#fff; border:1px solid #ddd; padding:10px; margin-top:10px; border-radius:8px; }
.actions { display:flex; gap:5px; flex-wrap:wrap; margin-top:10px; }
</style>
</head>

<body>

<div class="container" id="authBlock">
    <h3>Вход</h3>
    <button id="loginBtn">Войти через Google</button>
</div>

<div class="container" id="appBlock" style="display:none;">
    <h3 id="userName"></h3>
    <button id="logoutBtn">Выйти</button>

    <input id="name" placeholder="Имя">
    <input id="email" placeholder="Email">
    <button id="mainBtn">Добавить</button>
</div>

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore, collection, addDoc, query, orderBy,
    onSnapshot, serverTimestamp, updateDoc, doc,
    increment, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// 🔥 ТВОЙ CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCFVJ51BsKGuUxQt0o33SWEOGuwiZ3kEOk",
  authDomain: "nail-f4d56.firebaseapp.com",
  projectId: "nail-f4d56",
  storageBucket: "nail-f4d56.firebasestorage.app",
  messagingSenderId: "168626129143",
  appId: "1:168626129143:web:e7ce853bb23007b490ebf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// UI
const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const authBlock = document.getElementById("authBlock");
const appBlock = document.getElementById("appBlock");

// LOGIN
loginBtn.onclick = () => signInWithPopup(auth, provider);

// LOGOUT
logoutBtn.onclick = () => signOut(auth);

// STATE
onAuthStateChanged(auth, (user) => {
    if (user) {
        authBlock.style.display = "none";
        appBlock.style.display = "block";
        document.getElementById("userName").innerText = "👤 " + user.displayName;

        document.getElementById("name").value = user.displayName;
        document.getElementById("email").value = user.email;
    } else {
        authBlock.style.display = "block";
        appBlock.style.display = "none";
    }
});

// CREATE POST
document.getElementById("mainBtn").onclick = async () => {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    if (!name || !email) return alert("Заполни поля");

    await addDoc(collection(db, "requests"), {
        name,
        email,
        likes: 0,
        dislikes: 0,
        timestamp: serverTimestamp()
    });
};

// ACTIONS
window.like = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });
window.dislike = (id) => updateDoc(doc(db, "requests", id), { dislikes: increment(1) });
window.del = (id) => deleteDoc(doc(db, "requests", id));

// FEED
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snap) => {
    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snap.forEach(d => {
        const data = d.data();

        feed.innerHTML += `
        <div class="post">
            <b>${data.name}</b>
            <p>${data.email}</p>
            <div class="actions">
                <button onclick="like('${d.id}')">👍 ${data.likes || 0}</button>
                <button onclick="dislike('${d.id}')">👎 ${data.dislikes || 0}</button>
                <button onclick="del('${d.id}')">🗑</button>
            </div>
        </div>`;
    });
});
</script>

</body>
</html>
