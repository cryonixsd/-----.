<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DM App</title>

<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    margin: 0;
}

.navbar {
    background: #4CAF50;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.container {
    max-width: 500px;
    margin: 15px auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}

.user {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.user:hover {
    background: #f5f5f5;
}

.message {
    margin: 5px 0;
}

.me {
    text-align: right;
    color: green;
}

#chat {
    min-height: 150px;
    max-height: 250px;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="navbar" id="navbar" style="display:none;">
    <span id="userName"></span>
    <button id="logoutBtn">Выйти</button>
</div>

<div class="container" id="authBlock">
    <h3>Вход</h3>
    <button id="loginBtn">Войти через Google</button>
</div>

<div id="appBlock" style="display:none;">

    <!-- USERS -->
    <div class="container">
        <h3>Пользователи</h3>
        <div id="usersList"></div>
    </div>

    <!-- CHAT -->
    <div class="container">
        <h3 id="chatWith">Выберите пользователя</h3>
        <div id="chat"></div>

        <input id="messageInput" placeholder="Сообщение">
        <button onclick="sendMessage()">Отправить</button>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
    getFirestore, collection, addDoc, query,
    onSnapshot, serverTimestamp, doc, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCFVJ51BsKGuUxQt0o33SWEOGuwiZ3kEOk",
  authDomain: "nail-f4d56.firebaseapp.com",
  projectId: "nail-f4d56",
  storageBucket: "nail-f4d56.appspot.com",
  messagingSenderId: "168626129143",
  appId: "1:168626129143:web:e7ce853bb23007b490ebf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

let currentChatId = null;
let currentUserName = "";

// AUTH
onAuthStateChanged(auth, async (user) => {
    if (user) {
        document.getElementById("authBlock").style.display = "none";
        document.getElementById("appBlock").style.display = "block";
        document.getElementById("navbar").style.display = "flex";

        document.getElementById("userName").innerText = user.displayName;
        currentUserName = user.displayName;

        // сохраняем пользователя
        await setDoc(doc(db, "users", user.uid), {
            name: user.displayName,
            email: user.email
        });

        loadUsers();
    } else {
        document.getElementById("authBlock").style.display = "block";
        document.getElementById("appBlock").style.display = "none";
        document.getElementById("navbar").style.display = "none";
    }
});

// USERS
function loadUsers() {
    onSnapshot(collection(db, "users"), (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";

        snap.forEach(d => {
            if (d.id === auth.currentUser.uid) return;

            const u = d.data();

            list.innerHTML += `
                <div class="user" onclick="startChat('${d.id}','${u.name}')">
                    👤 ${u.name}
                </div>
            `;
        });
    });
}

// START CHAT
window.startChat = (otherUserId, otherUserName) => {
    const user = auth.currentUser;

    currentChatId = [user.uid, otherUserId].sort().join("_");

    document.getElementById("chatWith").innerText = "Чат с: " + otherUserName;

    loadMessages();
};

// SEND
window.sendMessage = async () => {
    const input = document.getElementById("messageInput");
    const text = input.value;

    if (!text || !currentChatId) return;

    await addDoc(collection(db, "messages"), {
        chatId: currentChatId,
        senderId: auth.currentUser.uid,
        senderName: currentUserName,
        text,
        timestamp: serverTimestamp()
    });

    input.value = "";
};

// LOAD MESSAGES
function loadMessages() {
    const q = query(collection(db, "messages"));

    onSnapshot(q, (snap) => {
        const chat = document.getElementById("chat");
        chat.innerHTML = "";

        snap.forEach(d => {
            const m = d.data();

            if (m.chatId !== currentChatId) return;

            const isMe = m.senderId === auth.currentUser.uid;

            chat.innerHTML += `
                <div class="message ${isMe ? 'me' : ''}">
                    <b>${m.senderName}:</b> ${m.text}
                </div>
            `;
        });
    });
}
</script>

</body>
</html>
